<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates</title>
    <link rel="icon" type="image/x-icon" href="/Images/android-chrome-192x192.png">
    <link href="/Stylesheet/style.css" rel="stylesheet">

    <style>
        .cert-section {
            padding: 20px 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .cert-section h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #7c3aed;
            letter-spacing: 1px;
        }

        .cert-grid {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr) !important;
            gap: 12px !important;
            max-width: 700px;
            margin: 0 auto;
            padding: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .cert-card {
            border: 2px solid #7c3aed !important;
            border-radius: 10px !important;
            overflow: hidden !important;
            box-shadow: 0 3px 10px rgba(124, 58, 237, 0.25) !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
            background: #fff !important;
            padding: 0 !important;
            margin: 0 !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }

        .cert-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(124, 58, 237, 0.4) !important;
        }

        .cert-card img {
            width: 100% !important;
            height: auto !important;
            display: block !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .cert-label {
            text-align: center;
            padding: 6px 4px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #7c3aed;
            background: #f5f0ff;
            border-top: 1px solid #e0d4fb;
            margin: 0;
        }

        @media (max-width: 480px) {
            .cert-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>

<body>
    <main class="container">

        <div class="item head">
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/Bio.html">Bio</a></li>
                    <li><a href="/Elevator-Pitch.html">Elevator Pitch</a></li>
                    <li><a href="/Volunteer.html">Volunteering</a></li>
                    <li><a href="/Work-Experiences.html">Work Experiences</a></li>
                    <li><a href="/Portfolio">Projects</a></li>
                </ul>
            </nav>
        </div>

        <div class="cert-section">
            <h1>My Certificates</h1>

            <div class="cert-grid">

                <div class="cert-card">
                    <img src="/img/mimo-certificates-125_page-0001.jpg"
                         alt="Python Certificate"
                         fetchpriority="high"
                         decoding="async">
                    <div class="cert-label">Python</div>
                </div>

                <div class="cert-card">
                    <img src="/img/mimo-certificates-197-2_page-0001.jpg"
                         alt="JavaScript Certificate"
                         loading="lazy"
                         decoding="async">
                    <div class="cert-label">JavaScript</div>
                </div>

                <div class="cert-card">
                    <img src="/img/mimo-certificates-226_page-0001.jpg"
                         alt="Python AI Certificate"
                         loading="lazy"
                         decoding="async">
                    <div class="cert-label">Python AI Development</div>
                </div>

                <div class="cert-card">
                    <img src="/img/mimo-certificates-CSS.jpg"
                         alt="CSS Certificate"
                         loading="lazy"
                         decoding="async">
                    <div class="cert-label">CSS</div>
                </div>

                <div class="cert-card">
                    <img src="/img/mimo-certificates-HTML.jpg"
                         alt="HTML Certificate"
                         loading="lazy"
                         decoding="async">
                    <div class="cert-label">HTML</div>
                </div>

                <div class="cert-card">
                    <img src="/img/118-founder-academy-4-week-certificate-chigemezu-emmanuel.png"
                         alt="Founder Academy Certificate"
                         loading="lazy"
                         decoding="async">
                    <div class="cert-label">ALX Founder Academy</div>
                </div>

            </div>
        </div>

    </main>
</body>
</html>
